<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Denominations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #f0c040;
    --accent2: #e07a30;
    --text: #f0ede8;
    --muted: #888;
    --coin: #c8a940;
    --note: #4a7c59;
  }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: 'DM Sans', sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* ── Background ── */
body::before {
content: '';
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 60% 40% at 20% 10%, rgba(240,192,64,.07) 0%, transparent 60%),
radial-gradient(ellipse 50% 50% at 80% 90%, rgba(224,122,48,.05) 0%, transparent 60%);
pointer-events: none;
z-index: 0;
}

/* ── Header ── */
header {
position: relative;
z-index: 10;
padding: 48px 48px 0;
display: flex;
align-items: flex-end;
justify-content: space-between;
flex-wrap: wrap;
gap: 24px;
}

.logo {
font-family: 'Bebas Neue', sans-serif;
font-size: clamp(40px, 6vw, 72px);
letter-spacing: 2px;
line-height: 1;
color: var(–accent);
text-shadow: 0 0 60px rgba(240,192,64,.25);
}

.logo span {
color: var(–text);
opacity: .4;
font-size: .55em;
display: block;
letter-spacing: 5px;
font-family: 'DM Mono', monospace;
font-weight: 300;
}

/* ── Rate badge ── */
#rate-badge {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px 20px;
font-family: 'DM Mono', monospace;
font-size: 13px;
color: var(–muted);
transition: all .3s;
}
#rate-badge strong { color: var(–accent); font-size: 16px; }
#rate-badge .rate-date { display: block; font-size: 10px; margin-top: 2px; opacity: .6; }

/* ── Controls ── */
.controls {
position: relative;
z-index: 10;
padding: 36px 48px 0;
display: flex;
gap: 16px;
flex-wrap: wrap;
align-items: center;
}

.select-wrap {
position: relative;
}

.select-wrap::after {
content: '▾';
position: absolute;
right: 14px;
top: 50%;
transform: translateY(-50%);
color: var(–accent);
pointer-events: none;
font-size: 12px;
}

select {
appearance: none;
background: var(–surface);
border: 1px solid var(–border);
color: var(–text);
font-family: 'DM Mono', monospace;
font-size: 14px;
padding: 12px 40px 12px 16px;
border-radius: 8px;
cursor: pointer;
transition: border-color .2s;
min-width: 200px;
}
select:hover { border-color: var(–accent); }
select:focus { outline: none; border-color: var(–accent); }

.target-label {
font-size: 13px;
color: var(–muted);
font-family: 'DM Mono', monospace;
}

/* ── Main grid ── */
main {
position: relative;
z-index: 10;
padding: 40px 48px 80px;
}

.section-title {
font-family: 'Bebas Neue', sans-serif;
font-size: 13px;
letter-spacing: 4px;
color: var(–muted);
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 12px;
}
.section-title::after {
content: '';
flex: 1;
height: 1px;
background: var(–border);
}

.section-spacer { margin-bottom: 40px; }

/* ── Denomination cards ── */
.denom-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 16px;
margin-bottom: 16px;
}

.denom-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 20px 24px;
display: flex;
align-items: center;
gap: 20px;
transition: transform .2s, border-color .2s, box-shadow .2s;
cursor: default;
animation: fadeUp .4s both;
}

.denom-card:hover {
transform: translateY(-2px);
border-color: var(–accent);
box-shadow: 0 8px 32px rgba(240,192,64,.08);
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to   { opacity: 1; transform: translateY(0); }
}

.denom-icon {
width: 56px;
height: 56px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 22px;
flex-shrink: 0;
position: relative;
overflow: hidden;
}

.denom-icon.coin {
background: radial-gradient(circle at 35% 35%, #e8c860, #a07820);
box-shadow: 0 4px 12px rgba(160,120,32,.4), inset 0 1px 2px rgba(255,255,255,.3);
}

.denom-icon.note {
background: linear-gradient(135deg, #2a5c3a, #1a3c28);
box-shadow: 0 4px 12px rgba(26,60,40,.5);
border-radius: 8px;
}

.denom-icon.note::after {
content: '';
position: absolute;
inset: 3px;
border: 1px solid rgba(255,255,255,.1);
border-radius: 6px;
}

.denom-info { flex: 1; min-width: 0; }

.denom-value {
font-family: 'Bebas Neue', sans-serif;
font-size: 28px;
letter-spacing: 1px;
color: var(–text);
line-height: 1;
}

.denom-name {
font-size: 11px;
color: var(–muted);
margin-top: 3px;
letter-spacing: .5px;
}

.denom-type-badge {
font-size: 9px;
font-family: 'DM Mono', monospace;
padding: 2px 6px;
border-radius: 3px;
letter-spacing: 1px;
text-transform: uppercase;
display: inline-block;
margin-top: 6px;
}
.denom-type-badge.coin { background: rgba(200,169,64,.15); color: var(–coin); }
.denom-type-badge.note { background: rgba(74,124,89,.2); color: #7bc48e; }

.denom-converted {
text-align: right;
flex-shrink: 0;
}

.converted-amount {
font-family: 'Bebas Neue', sans-serif;
font-size: 22px;
color: var(–accent);
letter-spacing: .5px;
line-height: 1;
}

.converted-currency {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(–muted);
margin-top: 3px;
}

/* ── Loading / error ── */
.state-msg {
font-family: 'DM Mono', monospace;
font-size: 13px;
color: var(–muted);
padding: 60px 0;
text-align: center;
}

.spinner {
display: inline-block;
width: 18px; height: 18px;
border: 2px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin .7s linear infinite;
vertical-align: middle;
margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error { color: #e05050; }

/* ── Legend ── */
.legend {
display: flex;
gap: 24px;
margin-bottom: 24px;
flex-wrap: wrap;
}
.legend-item {
display: flex;
align-items: center;
gap: 8px;
font-size: 12px;
color: var(–muted);
font-family: 'DM Mono', monospace;
}
.legend-dot {
width: 12px; height: 12px;
border-radius: 50%;
}
.legend-dot.coin { background: var(–coin); }
.legend-dot.note { background: #7bc48e; border-radius: 2px; }

/* ── Footer note ── */
.footnote {
margin-top: 48px;
padding-top: 24px;
border-top: 1px solid var(–border);
font-family: 'DM Mono', monospace;
font-size: 11px;
color: var(–muted);
line-height: 1.7;
}
.footnote a { color: var(–accent); text-decoration: none; }

@media (max-width: 600px) {
header, .controls, main { padding-left: 20px; padding-right: 20px; }
.denom-grid { grid-template-columns: 1fr; }
}
</style>

</head>

const TARGET = 'CHF';

// populate selector

let rateCache = {};

async function getRate(from) {
  if (rateCache[from]) return rateCache[from];

  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  rateCache[from] = { rate: data.rates[TARGET], date: data.date };
  return rateCache[from];
}

function formatCHF(amount) {
  if (amount < 0.01) return '< 0.01';
  return amount.toLocaleString('de-CH', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
}

function formatSource(value, symbol) {
  if (value >= 1000) return symbol + value.toLocaleString();
  return symbol + value;
}

async function render(code) {
  const content = document.getElementById('content');
  const badge = document.getElementById('rate-badge');

  if (!code) {
    content.innerHTML = '<div class="state-msg">Choose a currency above to see its denominations.</div>';
    return;
  }

  content.innerHTML = `<div class="state-msg"><span class="spinner"></span> Fetching live rates…</div>`;

  let rateInfo;
  try {
    rateInfo = await getRate(code);
  } catch (e) {
    content.innerHTML = `<div class="state-msg error">⚠ Could not load exchange rates. Check your connection.<br><small>${e.message}</small></div>`;
    return;
  }

  const info = DENOMINATIONS[code];
  const { rate, date } = rateInfo;

  // Update badge
  document.getElementById('rate-val').textContent =
    `1 ${code} = ${formatCHF(rate)} CHF`;
  document.getElementById('rate-date').textContent = `ECB rate · ${date}`;

  const coins = info.denominations.filter(d => d.type === 'coin');
  const notes = info.denominations.filter(d => d.type === 'note');

  function buildSection(items, label) {
    if (!items.length) return '';
    const cards = items.map((d, i) => {
      const chf = d.value * rate;
      return `
        <div class="denom-card" style="animation-delay:${i * 40}ms">
          <div class="denom-icon ${d.type}">
            ${d.type === 'coin' ? '🪙' : '💵'}
          </div>
          <div class="denom-info">
            <div class="denom-value">${formatSource(d.value, info.symbol)}</div>
            <div class="denom-name">${d.desc}</div>
            <span class="denom-type-badge ${d.type}">${d.type}</span>
          </div>
          <div class="denom-converted">
            <div class="converted-amount">${formatCHF(chf)}</div>
            <div class="converted-currency">CHF</div>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="section-title">${label}</div>
      <div class="denom-grid">${cards}</div>
      <div class="section-spacer"></div>`;
  }

  content.innerHTML =
    buildSection(coins, 'COINS') +
    buildSection(notes, 'BANKNOTES');
}

sel.addEventListener('change', () => render(sel.value));
render(sel.value);
</script>
