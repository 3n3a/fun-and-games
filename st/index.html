<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新幹線 · Shinkansen Live Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise-overlay"></div>

  <!-- ── HEADER ──────────────────────────────────── -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-logo">
          <span class="logo-ja">新幹線</span>
          <span class="logo-en">LIVE TRACKER</span>
        </div>
        <div class="header-controls">
          <div class="picker-group">
            <label class="picker-label" for="bound-select">Direction</label>
            <select id="bound-select">
              <option value="2">→ West bound</option>
              <option value="1">← East bound</option>
            </select>
          </div>
          <div class="picker-group">
            <label class="picker-label" for="train-select">Train</label>
            <select id="train-select" disabled>
              <option value="">— loading —</option>
            </select>
          </div>
          <button id="fetch-btn" class="fetch-btn" disabled>
            <span class="btn-spin" id="btn-spin">⟳</span>
            <span>Track</span>
          </button>
          <button id="refresh-btn" class="refresh-btn" title="Refresh live train list">↺</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── SERVICE STATUS BAR ──────────────────────── -->
  <div id="status-bar" class="status-bar hidden">
    <div class="container"><span id="status-text"></span></div>
  </div>

  <!-- ── MOBILE TABS ─────────────────────────────── -->
  <div class="mobile-tabs">
    <button id="tab-list" class="mobile-tab active">📋 Trains</button>
    <button id="tab-detail" class="mobile-tab">🗺 Route</button>
  </div>

  <!-- ── MAIN ────────────────────────────────────── -->
  <main class="container main-layout">

    <!-- Left: live train list panel -->
    <aside class="live-panel">
      <div class="panel-head">
        <span class="panel-title">LIVE TRAINS</span>
        <span id="live-count" class="live-count">—</span>
      </div>
      <div id="live-list" class="live-list">
        <div class="live-loading">Loading…</div>
      </div>
    </aside>

    <!-- Right: selected train detail -->
    <section class="detail-panel">

      <!-- Mobile back button -->
      <button id="back-btn" class="back-btn hidden">← Back to trains</button>

      <div id="train-header" class="train-meta hidden">
        <div class="meta-badge">
          <span id="train-type-label" class="type-label"></span>
          <span id="train-number-label" class="train-number"></span>
          <span id="delay-badge" class="delay-badge hidden"></span>
        </div>
        <div class="meta-info">
          <div class="meta-item">
            <span class="meta-key">Direction</span>
            <span id="meta-direction" class="meta-val">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">Delay</span>
            <span id="meta-status" class="meta-val">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">Updated</span>
            <span id="meta-updated" class="meta-val">—</span>
          </div>
        </div>
      </div>

      <div id="error-box" class="error-box hidden">
        <p id="error-msg"></p>
      </div>

      <div id="loading" class="loading-state hidden">
        <div class="loader-track"><div class="loader-train"></div></div>
        <p>Fetching live data…</p>
      </div>

      <div id="empty-state" class="empty-state">
        <div class="empty-icon">🚄</div>
        <p>Select a train from the list<br/>or use the picker above</p>
      </div>

      <section id="route-section" class="route-section hidden">
        <div class="route-legend">
          <span class="legend-item"><span class="dot dot--passed"></span> Passed</span>
          <span class="legend-item"><span class="dot dot--current"></span> Current</span>
          <span class="legend-item"><span class="dot dot--upcoming"></span> Upcoming</span>
          <span class="legend-item"><span class="dot dot--skip"></span> No stop</span>
        </div>
        <div class="route-container">
          <div class="route-line" id="route-line"></div>
          <div id="stations-list" class="stations-list"></div>
        </div>
      </section>

    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Data: <strong>JR Central</strong> public API · Informational use only · Auto-refreshes every 60s</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
